<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Oradea Exchange App</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #004e92; color: white; }
        .buy { color: green; font-weight: bold; }
        .sell { color: red; font-weight: bold; }
        select { padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- TABELUL CU DATE DIN PYTHON -->
    <div class="card">
        <h2>📍 Curs Live: Prima Exchange Oradea</h2>
        <table>
            <thead>
                <tr>
                    <th>Valută</th>
                    <th>Descriere</th>
                    <th>Cumpărare (Amanet)</th>
                    <th>Vânzare (Amanet)</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cursuri %}
                <tr>
                    <td><strong>{{ item.name }}</strong></td>
                    <td>{{ item.description }}</td>
                    <td class="buy">{{ item.buy }}</td>
                    <td class="sell">{{ item.sell }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- GRAFICELE LIVE -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>📈 Grafic Interbancar Live</h2>
            <select id="currency-selector" onchange="changeChart()">
                <option value="FX_IDC:EURRON">Euro (EUR)</option>
                <option value="FX_IDC:USDRON">Dolar (USD)</option>
                <option value="FX_IDC:GBPRON">Liră (GBP)</option>
                <option value="FX_IDC:HUFRON">Forint (HUF)</option>
            </select>
        </div>
        <div id="tradingview_chart" style="height: 400px; margin-top: 15px;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function loadChart(symbol) {
            new TradingView.widget({
                "width": "100%",
                "height": 400,
                "symbol": symbol,
                "interval": "D",
                "theme": "light",
                "style": "3",
                "locale": "ro",
                "container_id": "tradingview_chart"
            });
        }
        function changeChart() {
            loadChart(document.getElementById('currency-selector').value);
        }
        window.onload = function() { loadChart('FX_IDC:EURRON'); };
    </script>
</body>
</html>
